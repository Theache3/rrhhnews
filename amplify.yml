version: 1
frontend:
  phases:
    preBuild:
      commands:
        - npm ci
        - printenv | grep '^DB_' | sed 's/=\(.*\)/="\1"/' > .env.production
    build:
      commands:
        - npm run build
  artifacts:
    baseDirectory: .next
    files:
      - '**/*'
  cache:
    paths:
      - .next/cache/**/*
      - node_modules/**/*
